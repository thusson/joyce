{% extends "stream/base.html" %}
{% block title %}Delete Comment — Joyce{% endblock %}
{% block content %}
<div class="card">
  <h1 style="font-size: 1.25rem;">Delete Comment</h1>
  <p>Are you sure you want to delete this comment by <strong>{{ comment.author.username }}</strong>?</p>
  <blockquote style="border-left: 3px solid #ccc; padding-left: 0.75rem; margin: 1rem 0; color: #555;">
    {{ comment.content }}
  </blockquote>
  <form method="post">
    {% csrf_token %}
    <div style="display: flex; gap: 0.5rem;">
      <button type="submit" class="btn btn-danger">Delete</button>
      <a href="{% url 'post_detail' pk=comment.post.pk %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
